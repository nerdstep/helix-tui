name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy check
        run: go mod tidy

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/helix

      - name: Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
